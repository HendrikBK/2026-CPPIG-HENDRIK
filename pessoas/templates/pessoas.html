{%  extends 'main.html' %}
{% load django_bootstrap5 %}
{% load static %}
{% block content %}
<section class="section">
        <div class="container">
            <form action="" method="GET">
                <div class="form-group row p-3">
                    <label class="col-sm-2 col-form-label">Nome da pessoa: </label>
                    <div class="col-sm-8">
                        <input class="form-control" type="text" name="buscar" value="{{ request.GET.buscar }}"
                               placeholder="Digite o nome da pessoa">
                    </div>
                    <div class="col-sm-2">
                        <button type="submit" class="btn btn-primary">
                            Buscar
                        </button>
                    </div>
                </div>
            </form>
        {% if object_list %}
                <div class="card-body">
                    <h3 class="text-center">Pessoas Cadastradas</h3>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-success">
                                <th>Nome</th>
                                <th>CPF</th>
                                <th style="width: 100px; text-align: center">Ações</th>
                            </thead>
                            <tbody>
                            {% for pessoa in object_list %}
                                    <tr>
                                        <td>{{ pessoa.nome }}</td>
                                        <td>{{ pessoa.cpf }}</td>
                                        <td style="text-align: center">
                                            <a href="{% url 'pessoa_editar' pessoa.pk %}">
                                                <span class="icon">
                                                    <i class="fas fa-edit"></i>
                                                </span>
                                            </a>
                                            <a href="{% url 'pessoa_apagar' pessoa.pk %}">
                                                <span class="icon">
                                                    <i class="far fa-trash-alt"></i>
                                                </span>
                                            </a>
                                        </td>
                                    </tr>
                            {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
        {% endif %}
        </div>
    </section>
{% endblock %}
